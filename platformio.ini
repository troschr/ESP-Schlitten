; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = nodemcu-32s

[env:nodemcu-32s]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
monitor_filters = send_on_enter
lib_deps =
  pololu/VL53L0X

[env:test_drv8825]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../test/drv8825/>

[env:test_cl42t]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../test/cl42t/>

[env:test_cl42t_2axis]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../test/cl42t_2axis/>

[env:test_full_4axis]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
monitor_filters = send_on_enter, echo
build_src_filter = -<*> +<../test/full_4axis/>

[env:test_full_system]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
monitor_filters = send_on_enter, echo
lib_deps = pololu/VL53L0X
build_flags = -I src
build_src_filter = -<*> +<../test/full_system/>

[env:test_sensor_i2c]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
monitor_filters = send_on_enter, echo
lib_deps = pololu/VL53L0X
build_src_filter = -<*> +<../test/sensor_i2c/>
